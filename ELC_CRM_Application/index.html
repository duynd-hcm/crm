<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ELC CRM</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                  "tertiary-fixed-dim": "#ffb95f",
                  "surface-container": "#e5eeff",
                  "secondary-fixed": "#71f8e4",
                  "on-tertiary-fixed": "#2a1700",
                  "on-tertiary-container": "#cc8200",
                  "surface-dim": "#cbdbf5",
                  "on-error-container": "#93000a",
                  "on-surface": "#0b1c30",
                  "on-tertiary": "#ffffff",
                  "on-surface-variant": "#44474e",
                  "tertiary": "#241300",
                  "tertiary-fixed": "#ffddb8",
                  "outline-variant": "#c5c6ce",
                  "secondary": "#006b5f",
                  "tertiary-container": "#3f2500",
                  "inverse-primary": "#b6c7ec",
                  "error-container": "#ffdad6",
                  "on-secondary-container": "#006f64",
                  "inverse-on-surface": "#eaf1ff",
                  "on-secondary-fixed": "#00201c",
                  "surface": "#f8f9ff",
                  "primary-container": "#1a2b49",
                  "surface-tint": "#4e5e7f",
                  "on-secondary-fixed-variant": "#005048",
                  "secondary-fixed-dim": "#4fdbc8",
                  "surface-variant": "#d3e4fe",
                  "surface-container-highest": "#d3e4fe",
                  "on-primary": "#ffffff",
                  "on-primary-fixed-variant": "#364766",
                  "on-secondary": "#ffffff",
                  "surface-container-high": "#dce9ff",
                  "primary-fixed": "#d7e2ff",
                  "error": "#ba1a1a",
                  "primary-fixed-dim": "#b6c7ec",
                  "outline": "#75777e",
                  "on-error": "#ffffff",
                  "on-primary-container": "#8293b6",
                  "surface-container-lowest": "#ffffff",
                  "background": "#f8f9ff",
                  "on-tertiary-fixed-variant": "#653e00",
                  "surface-container-low": "#eff4ff",
                  "on-primary-fixed": "#081b38",
                  "on-background": "#0b1c30",
                  "inverse-surface": "#213145",
                  "secondary-container": "#6df5e1",
                  "surface-bright": "#f8f9ff",
                  "primary": "#031633"
              },
              borderRadius: {
                  DEFAULT: "0.125rem",
                  lg: "0.25rem",
                  xl: "0.5rem",
                  full: "0.75rem"
              },
              spacing: {
                  gutter: "16px",
                  margin: "24px",
                  lg: "24px",
                  base: "4px",
                  xs: "4px",
                  md: "16px",
                  sm: "8px",
                  xl: "32px"
              },
              fontFamily: {
                  h3: ["Inter"],
                  h1: ["Inter"],
                  "label-sm": ["Inter"],
                  h2: ["Inter"],
                  "body-lg": ["Inter"],
                  "body-md": ["Inter"]
              },
              fontSize: {
                  h3: ["20px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                  h1: ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                  h2: ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                  "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                  "body-md": ["14px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
</head>
<body class="bg-background text-on-background antialiased overflow-x-hidden">

<aside class="flex flex-col w-64 h-full py-6 fixed left-0 z-50 bg-slate-50 dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800">
    <div class="px-6 mb-8">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary-container rounded flex items-center justify-center">
                <span class="material-symbols-outlined text-white" data-icon="school">school</span>
            </div>
            <div>
                <h1 class="text-lg font-black text-[#1A2B49] dark:text-white uppercase tracking-wider">ELC CRM</h1>
                <p class="font-sans text-[11px] leading-tight text-slate-500">Academic Management</p>
            </div>
        </div>
    </div>
    
    <nav class="flex-1 space-y-1" id="nav-menu">
        <a href="#/dashboard" class="nav-link mx-2 px-3 py-2 flex items-center gap-3 rounded-md transition-all duration-200 ease-in-out font-sans text-[13px] leading-tight text-slate-600 hover:bg-slate-200">
            <span class="material-symbols-outlined">dashboard</span> Dashboard
        </a>
        <a href="#/students" class="nav-link mx-2 px-3 py-2 flex items-center gap-3 rounded-md transition-all duration-200 ease-in-out font-sans text-[13px] leading-tight text-slate-600 hover:bg-slate-200">
            <span class="material-symbols-outlined">group</span> Students
        </a>
        <a href="#/leads" class="nav-link mx-2 px-3 py-2 flex items-center gap-3 rounded-md transition-all duration-200 ease-in-out font-sans text-[13px] leading-tight text-slate-600 hover:bg-slate-200">
            <span class="material-symbols-outlined">payments</span> Leads & Sales
        </a>
        <a href="#/classes" class="nav-link mx-2 px-3 py-2 flex items-center gap-3 rounded-md transition-all duration-200 ease-in-out font-sans text-[13px] leading-tight text-slate-600 hover:bg-slate-200">
            <span class="material-symbols-outlined">school</span> Classes
        </a>
    </nav>
    
    <div class="px-4 mt-auto space-y-4">
        <button class="w-full bg-secondary text-white py-2.5 rounded-lg font-h3 text-label-sm flex items-center justify-center gap-2 shadow-sm hover:brightness-90 transition-all">
            <span class="material-symbols-outlined text-[18px]">add</span> New Enrollment
        </button>
        <div class="pt-4 border-t border-slate-200 dark:border-slate-800">
            <a href="#" class="text-slate-600 dark:text-slate-400 mx-2 px-3 py-2 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-md transition-all duration-200 ease-in-out font-sans text-[13px] leading-tight">
                <span class="material-symbols-outlined">settings</span> Settings
            </a>
            <a href="#" class="text-slate-600 dark:text-slate-400 mx-2 px-3 py-2 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-md transition-all duration-200 ease-in-out font-sans text-[13px] leading-tight">
                <span class="material-symbols-outlined">logout</span> Logout
            </a>
        </div>
    </div>
</aside>

<div class="ml-64 min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header class="flex items-center justify-between px-6 h-16 w-full sticky top-0 z-40 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center flex-1">
            <div class="relative w-96">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
                <input type="text" placeholder="Search students, invoices, or classes..." class="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-800 border-none rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20" />
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button class="p-2 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors rounded-full">
                <span class="material-symbols-outlined">help_outline</span>
            </button>
            <div class="relative">
                <button class="p-2 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors rounded-full">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
            </div>
            <div class="h-8 w-px bg-slate-200 dark:border-slate-800 mx-2"></div>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <p class="text-sm font-bold text-slate-900 dark:text-white leading-none">Admin User</p>
                    <p class="text-[11px] text-slate-500 uppercase tracking-tighter">Center Manager</p>
                </div>
                <div class="w-9 h-9 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600 border-2 border-slate-100">AU</div>
            </div>
        </div>
    </header>

    <!-- Main Dynamic Content -->
    <main id="app-content" class="flex-1">
        <!-- Content will be injected here via JS -->
    </main>
</div>

<script src="main.js" type="module"></script>
</body>
</html>
